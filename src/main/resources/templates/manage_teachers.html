<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Teachers - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🚀 Admin Panel</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Manage Teachers</h2>
        <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
        <div class="row">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">Add New Teacher</div>
                    <div class="card-body">
                        <form th:action="@{/admin/teachers/add}" th:object="${newTeacher}" method="post">
                            <div class="mb-3">
                                <label for="teacherName" class="form-label">Teacher Name</label>
                                <input type="text" class="form-control" id="teacherName" th:field="*{name}" required>
                            </div>
                            <div class="mb-3">
                                <label for="teacherEmail" class="form-label">Email (Used for Login)</label>
                                <input type="email" class="form-control" id="teacherEmail" th:field="*{email}" required>
                            </div>
                            <div class="mb-3">
                                <label for="teacherBirthDate" class="form-label">Birth Date</label>
                                <input type="date" class="form-control" id="teacherBirthDate" th:field="*{birthDate}" required>
                                <div class="form-text">Used for initial password generation.</div>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Teacher</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card">
                     <div class="card-header">Existing Teachers</div>
                     <div class="card-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr><th>ID</th><th>Teacher Name</th><th>Email</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="teacher : ${teacherList}">
                                    <td th:text="${teacher.id}">1</td>
                                    <td th:text="${teacher.name}">Sample Name</td>
                                    <td th:text="${teacher.email}">sample@email.com</td>
                                    <td>
                                        <a th:href="@{/admin/teachers/edit/{id}(id=${teacher.id})}" class="btn btn-sm btn-warning">Edit</a>
                                        <a th:href="@{/admin/teachers/delete/{id}(id=${teacher.id})}" class="btn btn-sm btn-danger">Delete</a>
                                        <a th:href="@{/admin/users/reset-password/{id}(id=${teacher.id}, userType='teacher')}" class="btn btn-sm btn-secondary ms-1" title="Reset Password">Reset Pwd</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                     </div>
                </div>
            </div>
        </div>
        <a href="/admin/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
