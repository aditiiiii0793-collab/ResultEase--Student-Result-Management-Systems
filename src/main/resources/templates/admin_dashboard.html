<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🚀 Admin Dashboard</a>
            <div>
                <a href="/change-password" class="btn btn-outline-light btn-sm me-2">Change Password</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Welcome, Admin!</h1>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Courses</h5>
                        <p class="card-text fs-1" th:text="${courseCount}">0</p>
                    </div>
                </div>
            </div>
             <div class="col-md-4">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Teachers</h5>
                        <p class="card-text fs-1" th:text="${teacherCount}">0</p>
                    </div>
                </div>
            </div>
             <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Students</h5>
                        <p class="card-text fs-1" th:text="${studentCount}">0</p>
                    </div>
                </div>
            </div>
        </div>

        <h4>Management Options</h4>
        <div class="list-group">
            <a href="/admin/courses" class="list-group-item list-group-item-action">Manage Courses</a>
            <a href="/admin/subjects" class="list-group-item list-group-item-action">Manage Subjects</a>
            <a href="/admin/teachers" class="list-group-item list-group-item-action">Manage Teachers</a>
            <a href="/admin/students" class="list-group-item list-group-item-action">Manage Students</a>
        </div>
    </div>
</body>
</html>
