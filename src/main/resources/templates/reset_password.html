<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; } .reset-card { max-width: 450px; width: 100%; } </style>
</head>
<body>
    <div class="card reset-card shadow">
        <div class="card-body p-5">
            <h3 class="card-title text-center mb-4">Enter New Password</h3>
            <div th:if="${message}" class="alert alert-info" role="alert" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}" />
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword" minlength="8" required>
                    <div class="form-text">Must be at least 8 characters long.</div>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </div>
                 <div class="text-center mt-3">
                    <a href="/login">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
