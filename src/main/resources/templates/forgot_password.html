<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .reset-card {
            max-width: 450px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card reset-card shadow">
        <div class="card-body p-5">
            <h3 class="card-title text-center mb-4">Reset Your Password</h3>
            <p class="text-muted text-center">Enter the email address associated with your account, and we'll send you a link to reset your password (if found).</p>

            <div th:if="${message}" class="alert alert-info" role="alert" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Send Reset Link</button>
                </div>
                <div class="text-center mt-3">
                    <a href="/login">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
