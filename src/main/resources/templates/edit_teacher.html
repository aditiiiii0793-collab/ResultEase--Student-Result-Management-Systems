<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Teacher - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🚀 Admin Panel</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Edit Teacher</h2>
        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/teachers/update/{id}(id=${teacher.id})}" th:object="${teacher}" method="post">
                    <div class="mb-3">
                        <label for="teacherName" class="form-label">Teacher Name</label>
                        <input type="text" class="form-control" id="teacherName" th:field="*{name}">
                    </div>
                    <div class="mb-3">
                        <label for="teacherEmail" class="form-label">Email (Used for Login)</label>
                        <input type="email" class="form-control" id="teacherEmail" th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label for="teacherBirthDate" class="form-label">Birth Date</label>
                        <input type="date" class="form-control" id="teacherBirthDate" th:field="*{birthDate}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/admin/teachers" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
