<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🚀 Admin Panel</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Edit Student</h2>
        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
                    <div class="mb-3">
                        <label for="studentName" class="form-label">Student Name</label>
                        <input type="text" class="form-control" id="studentName" th:field="*{name}">
                    </div>
                    <div class="mb-3">
                        <label for="rollNo" class="form-label">Roll Number</label>
                        <input type="text" class="form-control" id="rollNo" th:field="*{rollNumber}">
                    </div>
                     <div class="mb-3">
                        <label for="email" class="form-label">Email (Used for Login)</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                    <div class="mb-3">
                        <label for="birthDate" class="form-label">Birth Date</label>
                        <input type="date" class="form-control" id="birthDate" th:field="*{birthDate}" required>
                    </div>
                    <div class="mb-3">
                        <label for="courseSelect" class="form-label">Enroll in Course</label>
                        <select class="form-select" id="courseSelect" th:field="*{course.id}">
                            <option th:each="course : ${courseList}" th:value="${course.id}" th:text="${course.name}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/admin/students" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
