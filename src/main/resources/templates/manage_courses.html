<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Courses - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🚀 Admin Panel</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Manage Courses</h2>
        
        <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

        <div class="card mb-4">
            <div class="card-header">Add New Course</div>
            <div class="card-body">
                <form th:action="@{/admin/courses/add}" th:object="${newCourse}" method="post">
                    <div class="mb-3"><label class="form-label">Course Name</label><input type="text" class="form-control" th:field="*{name}" required></div>
                    <button type="submit" class="btn btn-primary">Add Course</button>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Existing Courses</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead><tr><th>ID</th><th>Course Name</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="course : ${courseList}">
                            <td th:text="${course.id}"></td>
                            <td th:text="${course.name}"></td>
                            <td>
                                <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <a href="/admin/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
