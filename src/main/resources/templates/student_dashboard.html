<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🎓 Student Portal</a>
            <div>
                <a href="/change-password" class="btn btn-outline-light btn-sm me-2">Change Password</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
         <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Welcome, <span th:text="${student?.name ?: 'Student'}">Student</span>!</h1>
            <h5 class="text-muted" th:if="${student != null}" th:text="'Roll No: ' + ${student.rollNumber}">Roll No: ...</h5>
        </div>
        
        <h4>Marksheet by Semester</h4>
        
        <div th:if="${#maps.isEmpty(resultsByCourse)}" class="alert alert-warning">
            No results found yet.
        </div>

        <div th:each="courseGroup : ${resultsByCourse}" class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0" th:text="${courseGroup.key.name}">Course Name</h5>
            </div>
            <div class="card-body">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="alert alert-info py-2">
                            <strong>Semester Percentage: </strong>
                            <span class="fs-5" th:text="${#numbers.formatDecimal(percentagePerCourse[courseGroup.key.name], 1, 2) + '%'}">0.00%</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="alert alert-primary py-2">
                            <strong>Semester Grade: </strong>
                            <span class="fs-5" th:text="${gradePerCourse[courseGroup.key.name]}">N/A</span>
                        </div>
                    </div>
                </div>
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Subject</th>
                            <th th:text="'IA-1 (Max ' + ${courseGroup.value[0].subject?.ia1MaxMarks ?: 20} + ')'">IA-1</th>
                            <th th:text="'IA-2 (Max ' + ${courseGroup.value[0].subject?.ia2MaxMarks ?: 20} + ')'">IA-2</th>
                            <th th:text="'Term Work (Max ' + ${courseGroup.value[0].subject?.termWorkMaxMarks ?: 20} + ')'">Term Work</th>
                            <th th:text="'Final Exam (Max ' + ${courseGroup.value[0].subject?.finalExamMaxMarks ?: 60} + ')'">Final Exam</th>
                            <th>Total</th>
                            <th>Grade (Subject)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="result : ${courseGroup.value}">
                            <td th:text="${result.subject?.name ?: 'Unknown Subject'}">Physics</td>
                            <td th:text="${result.ia1Marks != null ? result.ia1Marks : '--'}">--</td>
                            <td th:text="${result.ia2Marks != null ? result.ia2Marks : '--'}">--</td>
                            <td th:text="${result.termWorkMarks != null ? result.termWorkMarks : '--'}">--</td>
                            <td th:text="${result.finalExamMarks != null ? result.finalExamMarks : '--'}">--</td>
                            <td th:text="${result.totalMarksObtained}">--</td>
                            <td th:text="${result.grade != null ? result.grade : '--'}">--</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        </div>
</body>
</html>
