<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Students - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">🚀 Admin Panel</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Manage Students</h2>
        <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        
        <div class="card mb-4">
            <div class="card-header">Enroll New Student</div>
            <div class="card-body">
                <form th:action="@{/admin/students/add}" th:object="${newStudent}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text" class="form-control" th:field="*{rollNumber}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email (Used for Login)</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Birth Date</label>
                        <input type="date" class="form-control" th:field="*{birthDate}" required>
                        <div class="form-text">Used for initial password generation.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Enroll in Course</label>
                        <select class="form-select" th:field="*{course.id}" required>
                            <option value="">Choose...</option>
                            <option th:each="course : ${courseList}" th:value="${course.id}" th:text="${course.name}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Enroll Student</button>
                </form>
            </div>
        </div>

        <hr>
        <h2>Enrolled Students by Course</h2>

        <div th:each="courseItem : ${courseList}" class="card mb-3">
             <div class="card-header">
                <h5 class="mb-0" th:text="${courseItem.name}">Course Name</h5>
             </div>
             <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Roll No.</th>
                            <th>Student Name</th>
                            <th>Email (Login)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Check if there are any students for this course -->
                        <tr th:if="${#lists.isEmpty(studentList.?[course != null and course.id == __${courseItem.id}__])}">
                            <td colspan="5" class="text-center text-muted">No students enrolled in this course.</td>
                        </tr>
                        
                        <!-- Display students for this course -->
                        <tr th:each="student : ${studentList}" 
                            th:if="${student.course != null and student.course.id == courseItem.id}">
                            <td th:text="${student.id}">1</td>
                            <td th:text="${student.rollNumber}">CS101</td>
                            <td th:text="${student.name}">Ada Lovelace</td>
                            <td th:text="${student.email}">student@example.com</td>
                            <td>
                                <a th:href="@{/admin/students/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{/admin/students/delete/{id}(id=${student.id})}" class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
                                <a th:href="@{/admin/users/reset-password/{id}(id=${student.id}, userType='student')}" 
                                   class="btn btn-sm btn-secondary ms-1" title="Reset Password">Reset Pwd</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
             </div>
        </div>
        
        <a href="/admin/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
