<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enter Marks - ResultEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">
        <div class="container-fluid"><a class="navbar-brand" href="#">👩‍🏫 Teacher Portal</a>
             <div>
                <a href="/change-password" class="btn btn-outline-light btn-sm me-2">Change Password</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div th:with="maxMarks=${assessmentType == 'ia1' ? subject.ia1MaxMarks : 
                               (assessmentType == 'ia2' ? subject.ia2MaxMarks : 
                               (assessmentType == 'termwork' ? subject.termWorkMaxMarks : subject.finalExamMaxMarks))}">
            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h2 mb-0">Enter Marks for <span th:text="${subject?.name}">Subject</span> - <span th:text="${assessmentType}">IA-1</span> (<span th:text="'Max: ' + ${maxMarks}"></span>)</h1>
                <a th:href="@{/teacher/subject/{id}(id=${subject?.id})}" class="btn btn-secondary">← Back to Assessments</a>
            </div>
        
            <form th:action="@{/teacher/subject/saveMarks}" th:object="${marksForm}" method="post">
                <input type="hidden" name="subjectId" th:value="${subject?.id}" />
                <input type="hidden" name="assessmentType" th:value="${assessmentType}" />

                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr><th>Roll No.</th><th>Student Name</th><th>Marks</th></tr>
                    </thead>
                    <tbody>
                         <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="3" class="text-center text-muted">No students enrolled in this course yet.</td>
                        </tr>
                        <tr th:each="student, iterStat : ${students}">
                            <td th:text="${student.rollNumber}">S101</td>
                            <td th:text="${student.name}">Student Name</td>
                            <td>
                                <input type="number" class="form-control"
                                       th:name="|results[${iterStat.index}].${assessmentType == 'ia1' ? 'ia1Marks' : (assessmentType == 'ia2' ? 'ia2Marks' : (assessmentType == 'termwork' ? 'termWorkMarks' : 'finalExamMarks'))}|"
                                       th:value="${resultsMap.containsKey(student.id)} ? ${assessmentType == 'ia1' ? resultsMap.get(student.id).ia1Marks : (assessmentType == 'ia2' ? resultsMap.get(student.id).ia2Marks : (assessmentType == 'termwork' ? resultsMap.get(student.id).termWorkMarks : resultsMap.get(student.id).finalExamMarks))} : ''"
                                       th:max="${maxMarks}" min="0" />

                                <input type="hidden" th:name="|results[${iterStat.index}].student.id|" th:value="${student.id}" />
                            </td>
                        </tr>
                    </tbody>
                </table>
                <button type="submit" class="btn btn-primary" th:if="${not #lists.isEmpty(students)}">Save Marks</button>
            </form>
        </div>
    </div>
</body>
</html>
