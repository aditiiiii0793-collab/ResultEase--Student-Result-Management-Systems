# MariaDB Database Connection
# We added allowPublicKeyRetrieval=true to fix the authentication plugin error
spring.datasource.url=jdbc:mysql://localhost:3306/result_db?allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Specify the MariaDB dialect
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Set the server port
server.port=8081

# Security debug logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.resultease=DEBUG

# Disable H2 console
spring.h2.console.enabled=false